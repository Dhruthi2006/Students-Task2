<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
             background-image: linear-gradient(to bottom right,
                    rgb(229, 232, 203),
                    rgb(222, 187, 187));
        }

        form {
            text-align: center;
            margin: 20px;
            padding: 20px;
            background-color: rgba(246, 245, 247, 0.902);
            width: 350px;
            height: 400px;
            border-radius: 10px;
            margin-left: 600px;
            margin-top: 100px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="password"] {
            border-radius: 5px;
            border: none;
            padding: 10px;
            margin: 10px;
        }

        h3 {
            text-align: center;
        }

        label {
            font-size: 20px;
            font-weight: 700px;
        }

        button {
            background-color: rgba(113, 140, 230, 0.858);
            border: none;
            border-radius: 5px;
            height: 40px;
            width: 100px;

        }

        input[type="submit"] {
            /* padding:1px; */
            /* margin:10px; */
            width: 300px;
            border-radius: 5px;
            border: none;
            height: 40px;
        }

        nav {
            background-color: black;
            height: 50px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
        }

        h1 {
            text-align: center;
        }

        a {
            text-decoration: none;
            font-size: 30px;
            color: white;
            margin: 20px;
            /* padding-top: 20px; */

        }

        nav a:hover {
            color: rgb(160, 164, 221);
        }

        table {
            margin: 30px auto;
            /* centers the table */
            border-collapse: collapse;
            width: 80%;
            background-color: rgba(154, 116, 190, 0.137);
            color: rgb(19, 18, 18);
            text-align: center;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        th {
            background-color: rgba(7, 0, 0, 0.34);
            padding: 12px;
            font-size: 18px;
        }

        td {
            padding: 10px;
            background-color: rgba(54, 54, 54, 0.1);
        }

        tr:nth-child(even) {
            background-color: rgba(255, 255, 255, 0.08);
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        table button {
            padding: 8px 15px;
            margin: 3px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        table button:first-child {
            background-color: #7ca37e;
        }

        table button:last-child {
            background-color: #f44336;
        }

        table button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <nav>
        <a href="addStudents.html">Add Students</a>
        <a href=editStudents.html>Edit Students</a>
        <!-- <a href="deleteStudents.html">Delete Students</a> -->
        <a href="viewStudents.html">View Students</a>
        <a href="Index.html">Log Out</a>
    </nav>
    <h2 style="text-align: center;"> Students</h2>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll Number</th>
                <th>Branch</th>
                <th>CGPA</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="studentTable">
        </tbody>
    </table>
    <script>


        let table = document.getElementById("studentTable");
        async function loadStudents() {
            try {
                let response = await fetch(
                    "http://localhost:8081/students"
                );
                let students = await response.json();
                table.innerHTML = "";
                students.forEach(student => {
                    let row = table.insertRow();
                    row.insertCell(0).innerHTML = student.name;
                    row.insertCell(1).innerHTML = student.rollno;
                    row.insertCell(2).innerHTML = student.branch;
                    row.insertCell(3).innerHTML = student.cgpa;
                    row.insertCell(4).innerHTML =
                        `
            <button onclick="editStudent(${student.rollno})">
                Edit
            </button>
            <button onclick="deleteStudent(${student.rollno})">
                Delete
            </button>
            `;
                });
            }
            catch (error) {
                console.log(error);
                alert("Server not reachable");
            }
        }
        loadStudents();
        // EDIT
        function editStudent(rollno) {


            window.location.href =
                "editStudents.html?rollno=" + rollno;
        }
        // DELETE
        async function deleteStudent(id) {
            let confirmDelete =
                confirm("Are you sure you want to delete this student?");
            if (confirmDelete) {
                let response = await fetch(
                    `http://localhost:8081/students/${id}`,
                    {
                        method: "DELETE"
                    }
                );
                if (response.ok) {
                    alert("Student deleted successfully");
                    loadStudents();
                }
                else {
                    alert("Delete failed");
                }

            }

        }



    </script>
</body>

</html>
