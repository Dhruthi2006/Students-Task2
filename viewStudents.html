<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            align-items: center;
        }

        form {
            text-align: center;
            margin: 20px;
            padding: 20px;
            background-color: rgba(238, 212, 243, 0.902);
            width: 350px;
            height: 400px;
            border-radius: 10px;
            margin-left: 600px;
            margin-top: 100px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="password"] {
            border-radius: 5px;
            border: none;
            padding: 10px;
            margin: 10px;
        }

        h3 {
            text-align: center;
        }

        label {
            font-size: 20px;
            font-weight: 700px;
        }

        button {
            background-color: rgba(193, 114, 193, 0.858);
            border: none;
            border-radius: 5px;
            height: 40px;
            width: 100px;

        }

        input[type="submit"] {
            /* padding:1px; */
            /* margin:10px; */
            width: 300px;
            border-radius: 5px;
            border: none;
            height: 40px;
        }

        nav {
            background-color: black;
            height: 50px;
            text-align: center;
        }

        h1 {
            text-align: center;
        }

        a {
            text-decoration: none;
            font-size: 30px;
            color: white;
            margin: 20px;
            padding-top: 20px;

        }

        nav a:hover {
            color: plum;
        }
    </style>
</head>

<body>
    <nav>
        <a href="addStudents.html">Add Students</a>
        <a href=editStudents.html>Edit Students</a>
        <a href="deleteStudents.html">Delete Students</a>
        <a href="viewStudents.html">View Students</a>
        <a href="Index.html">Log Out</a>
    </nav>
    <h2> Students</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll Number</th>
                <th>Branch</th>
                <th>CGPA</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="studentTable">
        </tbody>
    </table>
    <script>let students = JSON.parse(localStorage.getItem("students")) || [];

        let table = document.getElementById("studentTable");

        students.forEach((student, index) => {

            let row = table.insertRow();

            row.insertCell(0).innerHTML = student.name;
            row.insertCell(1).innerHTML = student.rollno;
            row.insertCell(2).innerHTML = student.branch;
            row.insertCell(3).innerHTML = student.cgpa;

            row.insertCell(4).innerHTML =
                `<button onclick="editStudent(${index})">Edit</button>
         <button onclick="deleteStudent(${index})">Delete</button>`;
        });
        function editStudent(index) {
            localStorage.setItem("editIndex", index);
            window.location.href = "editStudents.html";
        }
        function deleteStudent(index) {

    let students = JSON.parse(localStorage.getItem("students")) || [];

    let confirmDelete = confirm("Are you sure you want to delete this student?");

    if(confirmDelete){
        students.splice(index, 1);

        localStorage.setItem("students", JSON.stringify(students));

        alert("Student deleted successfully");

        location.reload();
    }
}</script>
</body>

</html>
