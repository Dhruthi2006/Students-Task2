<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
    <style>
        nav{
            background-color:black;
            height:50px;
             text-align:center;
        }
        /* h1{
            text-align:center;
        } */
        a{
            text-decoration:none;
            font-size:30px;
            color:white;
            margin:20px;
            padding-top:20px;
            
        }
        nav a:hover{
            color:plum;
        }
        form{
            text-align:center;
            margin:20px;
            padding:20px;
            background-color:rgba(238, 212, 243, 0.902);
            width:500px;
            height:400px;
            border-radius:10px;
            margin-left:600px;
            margin-top:100px;
        }
        input[type="text"]{
            padding:10px;
            margin:10px;
            width:300px;
            border-radius:5px;
            border:none;
            height:40px;
        }
        input[type="password"]{
             /* padding:1px; */
            /* margin:10px; */
            width:300px;
            border-radius:5px;
            border:none;
            height:40px;
        }
        input[type="submit"], input[type="password"]{
            
            padding:10px;
        }
        .Label{
             font-size:20px;
            font-weight: 700px;
        }
        
    </style>
</head>
<body>
    

<form onsubmit="return validateForm()">

     <label for="email" class="Label">Email:</label>
    <input type="text" id="email"><br><br>
    <label for="password" class="Label">Password:</label>
    
    <input type="password" id="password"><br><br><br><br>

    <input type="submit" value="Login">

</form>

<script>

function validateForm() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    // Validation
    if(email == "" || password == "") {
        alert("All fields are required");
        return false;
    }
    window.location.href = "dashboard.html";

    return false;
}

</script>

</body>
</html>
