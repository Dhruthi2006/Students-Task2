<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {

            min-height: 100vh;
             background-image: linear-gradient(to bottom right, rgb(214, 223, 228), rgb(213, 204, 216));
        }

        form {
            margin: 100px auto;
            padding: 30px;
            background-color: white;
            width: 500px;
            height: auto;
            border-radius: 10px;
            text-align: left;
            box-shadow: 0px 10px 10px rgba(0, 0, 0, 0.2)
        }

        label {
            font-size: 20px;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 50px;
            padding: 10px;
            /* border: none; */
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 20px;
        }

        input[type="submit"] {
            padding: 10px 20px;
            /* border: none; */
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
        }

        nav {
            background-color: black;
            height: 50px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0;
        }

        nav a {
            text-decoration: none;
            font-size: 30px;
            color: white;
            margin: 0 20px;
        }

        nav a:hover {
            color: plum;
        }

        button {
            background-color: rgba(108, 37, 221, 0.858);
            border: none;
            border-radius: 5px;
            height: 50px;
            width: 150px;
            color: white;
            font-size: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>
    <nav>
        <a href="addStudents.html">Add Students</a>
        <a href=editStudents.html>Edit Students</a>
        <!-- <a href="deleteStudents.html">Delete Students</a> -->
        <a href="viewStudents.html">View Students</a>
        <a href="Index.html">Log Out</a>
    </nav>
    <form onsubmit="return addStudent()">
        <h3> Add Students</h3>
        <label for="name">Name</label>
        <input type="text" id="name">
        <br>
        <label for="rollno">Roll Number</label>
        <input type="text" id="rollno">
        <br>
        <label for="branch">Branch</label>
        <input type="text" id="branch">
        <br>
        <label for="cgpa">CGPA</label>
        <input type="text" id="cgpa">
        <br><br><br><br>
        <div class="btn-container">
            <button type="submit">Add Student</button>
        </div>

    </form>
    <script>
        function addStudent() {
            let name = document.getElementById("name").value;
            let rollno = document.getElementById("rollno").value;
            let branch = document.getElementById("branch").value;
            let cgpa = document.getElementById("cgpa").value;

            if (name === "" || rollno === "" || branch === "" || cgpa === "") {
                alert("Fill all fields");
                return;
            }

            let student = {
                name: name,
                rollno: rollno,
                branch: branch,
                cgpa: cgpa
            };

            let students = JSON.parse(localStorage.getItem("students")) || [];

            students.push(student);

            localStorage.setItem("students", JSON.stringify(students));

            alert("Student Added Successfully");

            window.location.href = "viewStudents.html";
        }
    </script>
</body>

</html>
