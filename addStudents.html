<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>

    <style>
        body {
            min-height: 100vh;
           background-image: linear-gradient(to bottom right,
                    rgb(229, 232, 203),
                    rgb(222, 187, 187));
            );
            margin: 0;
        }

        nav {
            background-color: black;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-size: 22px;
            margin: 0 20px;
        }

        nav a:hover {
            color: plum;
        }


        form {
            margin: 80px auto;
            padding: 30px;
            background-color: white;
            width: 500px;
            border-radius: 10px;
            box-shadow: 0px 10px 10px rgba(0,0,0,0.2);
        }


        h2 {
            text-align: center;
        }


        label {
            font-size: 20px;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }


        input {
            width: 100%;
            height: 45px;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 18px;
        }


        button {
            background-color: rgba(108,37,221,0.858);
            color: white;
            border: none;
            border-radius: 5px;
            width: 160px;
            height: 45px;
            font-size: 18px;
            cursor: pointer;
        }


        .btn-container {
            display: flex;
            justify-content: center;
        }

    </style>

</head>


<body>


<nav>

    <a href="addStudents.html">Add Students</a>

    <a href="editStudents.html">Edit Students</a>

    <a href="viewStudents.html">View Students</a>

    <a href="Index.html">Logout</a>

</nav>



<form onsubmit="addStudent(event)">


<h2>Add Student</h2>


<label>Name</label>
<input type="text" id="name">


<label>Roll Number</label>
<input type="number" id="rollno">


<label>Branch</label>
<input type="text" id="branch">


<label>CGPA</label>
<input type="number" step="0.01" id="cgpa">



<div class="btn-container">

<button type="submit">
    Add Student
</button>

</div>


</form>




<script>


async function addStudent(event){
    event.preventDefault();
    let student = {
        name : document.getElementById("name").value,
        rollno : document.getElementById("rollno").value,
        branch : document.getElementById("branch").value,
        cgpa : document.getElementById("cgpa").value
    };
    if(
        student.name==="" ||
        student.rollno==="" ||
        student.branch==="" ||
        student.cgpa===""
    ){

        alert("Please fill all fields");
        return;

    }
    try{
        let response = await fetch(
            "http://localhost:8081/students",
            {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify(student)
            }
        );
        if(response.ok){
            alert("Student added successfully");
            document.getElementById("name").value="";
            document.getElementById("rollno").value="";
            document.getElementById("branch").value="";
            document.getElementById("cgpa").value="";
        }
        else{
            alert("Unable to add student");
        }
    }
    catch(error){
        console.log(error);
        alert("Spring Boot server not reachable");
    }


}

</script>

</body>

</html>
