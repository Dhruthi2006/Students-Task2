<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form {
            margin: 100px auto;
            padding: 30px;
            background-color: rgba(238, 212, 243, 0.902);
            width: 500px;
            border-radius: 10px;
            text-align: left;
            box-shadow: 0px 10px 10px rgba(0, 0, 0, 0.2)
        }

        .Label {
            font-size: 20px;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            height: 40px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        input[type="submit"] {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button {
            background-color: rgba(193, 114, 193, 0.858);
            border: none;
            border-radius: 5px;
            height: 40px;
            width: 100px;

        }
    </style>
</head>

<body>

    <form onsubmit="return validate()">
        <H3 style="text-align: center;">Registartion form</H3>
        <label for=name>Name</label>
        <input type="text" id="name">
        <br>
        <label for=rollno>Roll Number</lable>
            <input type="number" id="rollno">
            <br>
            <label for="email">Email</label>
            <input type="email" id="email">
            <br>
            <label for="pass">Password</label>
            <input type="password" id="pass">
            <br>
             <label for="pass">Confrim Password</label>
            <input type="password" id="pass1">
            <br>
            <button type="submit">Register</button>
    </form><br>

    <script>
function validate() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("pass").value;
    let confirmPassword = document.getElementById("pass1").value;

    if(password !== confirmPassword){
        alert("Passwords do not match");
        return false;
    }

    localStorage.setItem("username", email);
    localStorage.setItem("password", password);

    alert("Registration Successful");

    window.location.href = "login.html";
    return false;
}

    </script>

</body>

</html>
